<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>タブレット用QRコード</title>
<style>
  body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f5f5f5; }
  h2 { color: #333; margin-bottom: 8px; }
  p  { color: #666; margin: 4px 0 20px; font-size: 14px; }
  #qr { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
  .url { margin-top: 16px; font-size: 13px; color: #888; word-break: break-all; max-width: 320px; text-align: center; }
</style>
</head>
<body>
<h2>📱 タブレットで読み取ってください</h2>
<p>カメラアプリでQRコードを読み取るとアプリが開きます</p>
<div id="qr"></div>
<div class="url">https://tabuse0415-ship-it.github.io/schedule-app/schedule-app.html</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
new QRCode(document.getElementById("qr"), {
  text: "https://tabuse0415-ship-it.github.io/schedule-app/schedule-app.html",
  width: 256,
  height: 256,
  colorDark: "#000000",
  colorLight: "#ffffff",
  correctLevel: QRCode.CorrectLevel.H
});
</script>
</body>
</html>
